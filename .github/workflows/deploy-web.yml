name: Deploy Web Demo

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    name: Export Godot Web
    runs-on: ubuntu-latest
    container:
      image: barichello/godot-ci:4.3
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Godot export templates
        run: |
          # The godot-ci image stores templates at /root/.local/share/godot/export_templates/
          # We need to copy them to the CI user's home (~/.local/share/godot/export_templates/)
          mkdir -v -p ~/.local/share/godot/export_templates/
          # The version directory inside the container is "4.3.stable"
          cp -r /root/.local/share/godot/export_templates/4.3.stable ~/.local/share/godot/export_templates/4.3.stable || true
          # Also try without .stable suffix in case the image uses a different naming
          cp -r /root/.local/share/godot/export_templates/* ~/.local/share/godot/export_templates/ || true
          echo "=== Templates found ==="
          ls -la ~/.local/share/godot/export_templates/
          echo "=== Inside 4.3.stable ==="
          ls -la ~/.local/share/godot/export_templates/4.3.stable/ || echo "No 4.3.stable dir"

      - name: Import project resources
        run: |
          godot --headless --import 2>&1 || true
          sleep 3

      - name: Export to Web
        run: |
          mkdir -v -p builds/web
          godot --headless --export-release "Web" builds/web/index.html 2>&1
          ls -la builds/web/

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: builds/web

  deploy:
    name: Deploy to GitHub Pages
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
