name: Echoes of Memory CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  validate-project:
    name: Validate Project
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check scene files exist
        run: |
          echo "Checking required scene files..."
          for scene in scenes/main_menu/main_menu.tscn scenes/game/game.tscn scenes/sanctuary/sanctuary.tscn scenes/collection/collection.tscn scenes/settings/settings.tscn; do
            if [ ! -f "$scene" ]; then echo "❌ Missing: $scene"; exit 1; fi
            echo "✅ Found: $scene"
          done

      - name: Check script files exist
        run: |
          echo "Checking required script files..."
          for script in scripts/global/save_manager.gd scripts/global/game_manager.gd scripts/global/audio_manager.gd scripts/global/scene_manager.gd scripts/game/sequence_generator.gd scripts/game/memory_node.gd scripts/game/echo_system.gd scripts/game/score_system.gd scripts/game/game_scene.gd scripts/sanctuary/sanctuary_manager.gd scripts/sanctuary/garden_element.gd scripts/sanctuary/idle_growth.gd scripts/sanctuary/sanctuary_scene.gd scripts/collection/emotion_fragment.gd scripts/collection/collection_manager.gd scripts/collection/collection_scene.gd scripts/ui/main_menu.gd scripts/ui/settings_scene.gd scripts/ui/hud.gd scripts/ui/share_panel.gd; do
            if [ ! -f "$script" ]; then echo "❌ Missing: $script"; exit 1; fi
            echo "✅ Found: $script"
          done

      - name: Validate JSON data files
        run: |
          echo "Validating JSON data files..."
          for json_file in data/*.json; do
            if [ ! -f "$json_file" ]; then echo "❌ Missing: $json_file"; exit 1; fi
            if ! python3 -m json.tool "$json_file" > /dev/null 2>&1; then echo "❌ Invalid JSON: $json_file"; exit 1; fi
            echo "✅ Valid JSON: $json_file"
          done

      - name: Check project.godot exists
        run: |
          if [ ! -f "project.godot" ]; then echo "❌ Missing project.godot"; exit 1; fi
          echo "✅ Found: project.godot"

      - name: Check export preset exists
        run: |
          if [ ! -f "export_presets.cfg" ]; then echo "❌ Missing export_presets.cfg"; exit 1; fi
          echo "✅ Found: export_presets.cfg"
